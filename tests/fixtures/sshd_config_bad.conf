# Insecure sshd_config — intentionally misconfigured for testing
# This represents a poorly-configured SSH server with many vulnerabilities

Port 22
Protocol 2,1
HostKey /etc/ssh/ssh_host_rsa_key

# Authentication — wide open
PermitRootLogin yes
PubkeyAuthentication yes
PasswordAuthentication yes
PermitEmptyPasswords yes
ChallengeResponseAuthentication yes

# No limits
MaxAuthTries 10
LoginGraceTime 120
StrictModes no

# Weak cryptography — includes deprecated algorithms
Ciphers aes128-cbc,3des-cbc,aes256-ctr
KexAlgorithms diffie-hellman-group14-sha1,diffie-hellman-group1-sha1
HostKeyAlgorithms ssh-rsa,ssh-dss

# No hardening
X11Forwarding yes
AllowTcpForwarding yes
PermitTunnel yes
GatewayPorts yes
ClientAliveInterval 0
ClientAliveCountMax 3

# No banner
PrintMotd yes
UseDNS yes

# Weak logging
LogLevel INFO
