# Mixed sshd_config — partially hardened for testing
# Some good settings mixed with security gaps

Port 2222
Protocol 2
HostKey /etc/ssh/ssh_host_ed25519_key

# Authentication — partially hardened
PermitRootLogin no
PubkeyAuthentication yes
PasswordAuthentication yes          # Should be no
PermitEmptyPasswords no
ChallengeResponseAuthentication no

# Limits — partially configured
MaxAuthTries 5                       # Should be <=3
LoginGraceTime 60
StrictModes yes

# Cryptography — mixed quality
Ciphers aes256-gcm@openssh.com,aes128-cbc,3des-cbc
KexAlgorithms curve25519-sha256,diffie-hellman-group14-sha1
HostKeyAlgorithms ssh-ed25519,ssh-rsa

# Hardening — partial
X11Forwarding no
AllowTcpForwarding yes               # Should be no
PermitTunnel no
GatewayPorts no
ClientAliveInterval 300
ClientAliveCountMax 2

# Banner configured but weak
Banner /etc/ssh/banner
PrintMotd no
UseDNS yes

LogLevel VERBOSE
